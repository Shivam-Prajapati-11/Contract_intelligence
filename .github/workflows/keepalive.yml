name: Keep Render Backend Alive

on:
  schedule:
    # Runs every 10 minutes — keeps Render free tier from spinning down (~15 min idle limit)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual trigger too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}\n" \
            https://contract-intelligence-api-uuse.onrender.com/health
      - name: Ping Render frontend
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}\n" \
            https://shivam-prajapati-11.github.io/Contract_intelligence/